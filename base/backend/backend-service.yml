apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP      # Internal cluster communication only
  selector:
    app: backend-app        # MUST match your Deployment's template labels
  ports:
  - protocol: TCP
    port: 8090           # The port the Service listens on inside the cluster
    targetPort: 8090     # The port your container is actually running on
