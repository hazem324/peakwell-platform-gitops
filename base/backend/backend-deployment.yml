apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      containers:
      - name: peakwell-backend
        image: hazem231/peakwell-backend:v12
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8090

        envFrom:
        - configMapRef:
            name: peakwell-config
        - secretRef:
            name: peakwell-secret

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        startupProbe: 
          httpGet:
            path: /health/startup
            port: 8090
          periodSeconds: 10 
          failureThreshold: 30 
          timeoutSeconds: 2 
          successThreshold: 1
        
        livenessProbe: 
          httpGet: 
            path: /health/live 
            port: 8090 
          periodSeconds: 10 
          failureThreshold: 3 
          timeoutSeconds: 2 
          successThreshold: 1 

        readinessProbe: 
          httpGet: 
            path: /health/ready 
            prot: 8090 
          periodSeconds: 5 
          failureThreshold: 2 
          timeoutSeconds: 2 
          successThreshold: 1 