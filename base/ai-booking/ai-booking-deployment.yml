apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-booking
  labels:
    app: ai-booking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-booking-app
  template:
    metadata:
      labels:
        app: ai-booking-app
    spec:
      containers:
      - name: peakwell-ai-booking
        image: hazem231/ai-booking:v10
        ports:
        - containerPort: 8001
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
