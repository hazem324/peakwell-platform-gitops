apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: peakwell-ingress
  namespace: peakwell
spec:
  ingressClassName: nginx

  rules:
  - host: peakwell.local

    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 4200