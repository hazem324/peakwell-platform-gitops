apiVersion: v1
kind: Service
metadata:
  name: allergen-predictor-service
spec:
  type: ClusterIP      # Internal cluster communication only
  selector:
    app: ai-event-app        # MUST match your Deployment's template labels
  ports:
  - protocol: TCP
    port: 8003           # The port the Service listens on inside the cluster
    targetPort: 8003     # The port your container is actually running on
